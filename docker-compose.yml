# docker-compose.yml
version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: mcdq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dq_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dq_pass}
      POSTGRES_DB: ${POSTGRES_DB:-dq_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dq_user} -d ${POSTGRES_DB:-dq_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Monte Carlo DQ API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: mcdq_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dq_user}:${POSTGRES_PASSWORD:-dq_pass}@postgres:5432/${POSTGRES_DB:-dq_db}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}
      DEFAULT_N_SIMULATIONS: ${DEFAULT_N_SIMULATIONS:-10000}
      QUALITY_THRESHOLD: ${QUALITY_THRESHOLD:-0.8}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - ./data:/app/data:ro

volumes:
  postgres_data:
    driver: local
